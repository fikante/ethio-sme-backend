user www-data;
worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Log to stdout for Railway's log viewer
    access_log /dev/stdout combined;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Gzip for text assets
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/javascript
        application/json
        application/x-javascript
        text/css
        text/html
        text/javascript
        text/plain
        text/xml;

    # Upstream: PHP-FPM on localhost
    upstream php_fpm {
        server 127.0.0.1:9000;
    }

    server {
        listen 80 default_server;
        server_name _;

        root /var/www/html/public;
        index index.php;

        # Max request body size (matches PHP's post_max_size)
        client_max_body_size 64M;

        # ── Security headers ──────────────────────────────────
        add_header X-Content-Type-Options  "nosniff"                       always;
        add_header X-Frame-Options         "SAMEORIGIN"                    always;
        add_header X-XSS-Protection        "1; mode=block"                 always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

        # ── Vite-compiled assets (content-hashed → immutable) ─
        location /build/ {
            expires max;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # ── Public storage files ──────────────────────────────
        location /storage/ {
            expires 7d;
            add_header Cache-Control "public";
            try_files $uri =404;
        }

        # ── Favicon / robots ──────────────────────────────────
        location = /favicon.ico { access_log off; log_not_found off; expires 1d; }
        location = /robots.txt  { access_log off; log_not_found off; }

        # ── Main application ──────────────────────────────────
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # ── PHP-FPM handler ───────────────────────────────────
        location ~ \.php$ {
            fastcgi_pass php_fpm;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_buffer_size 64k;
            fastcgi_buffers 4 64k;
            fastcgi_read_timeout 120s;
            fastcgi_send_timeout 120s;
            fastcgi_connect_timeout 10s;
        }

        # ── Block hidden files (except Let's Encrypt) ─────────
        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}
