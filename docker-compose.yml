services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ethio_sme_app
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "5173:5173"
    volumes:
      - .:/var/www/html
      - node_modules:/var/www/html/node_modules
    environment:
      PHP_CLI_SERVER_WORKERS: 8

volumes:
  node_modules:
